<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      width: 300px;
      background: #0d0d0d;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #27272a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -.3px }
    .header p  { font-size: 11px; color: #52525b; margin-top: 1px }

    .section { padding: 12px 16px; border-bottom: 1px solid #18181b }

    /* Status row */
    .status-row { display: flex; align-items: center; gap: 8px }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0 }
    .dot.green  { background: #22c55e; box-shadow: 0 0 6px #22c55e88 }
    .dot.red    { background: #ef4444 }
    .dot.yellow { background: #f59e0b }
    .status-label { font-size: 13px; font-weight: 500 }
    .status-sub   { font-size: 11px; color: #52525b; margin-top: 2px }

    /* Currently tracking */
    .now-playing {
      background: #18181b;
      border-radius: 8px;
      padding: 10px 12px;
      border: 1px solid #27272a;
    }
    .now-playing .np-label { font-size: 10px; color: #52525b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px }
    .now-playing .np-title { font-weight: 600; color: #fff; font-size: 13px }
    .now-playing .np-meta  { color: #71717a; font-size: 11px; margin-top: 3px }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px }
    .stat-box { background: #18181b; border-radius: 8px; padding: 8px 10px; text-align: center }
    .stat-box .val { font-size: 18px; font-weight: 700; color: #fff }
    .stat-box .lbl { font-size: 10px; color: #52525b; margin-top: 1px }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85 }
    .btn.primary   { background: #3b82f6; color: #fff }
    .btn.secondary { background: #27272a; color: #a1a1aa }
    .btn.danger    { background: #27272a; color: #ef4444 }

    /* Sites list */
    .sites { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px }
    .site-chip {
      background: #27272a; color: #a1a1aa;
      border-radius: 4px; padding: 2px 6px; font-size: 10px;
    }

    /* Footer */
    .footer {
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a { font-size: 11px; color: #3b82f6; text-decoration: none }
    .footer a:hover { text-decoration: underline }
    .version { font-size: 10px; color: #3f3f46 }

    .hidden { display: none !important }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="position:relative;display:flex;flex-direction:column;align-items:center;flex-shrink:0">
        <img src="icons/logo-star.png" alt="" style="position:absolute;bottom:100%;left:50%;transform:translateX(-50%);width:30px;height:auto;margin-bottom:4px;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.5))" />
        <div style="background:#0d0d0d;border-radius:12px;padding:6px 7px;box-shadow:0 0 0 2px #FF2D46">
          <img src="icons/logo-u-snake.png" alt="YOMU" style="width:52px;height:auto;display:block;filter:brightness(0) saturate(100%) invert(20%) sepia(100%) saturate(5000%) hue-rotate(330deg) brightness(1.1)" />
        </div>
      </div>
      <div>
        <h1 style="font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px">YOMU Tracker</h1>
        <p style="font-size:11px;color:#52525b;margin-top:1px">Auto-tracking your anime stats</p>
      </div>
    </div>
  </div>

  <!-- Connection status -->
  <div class="section" id="section-status">
    <div class="status-row">
      <div class="dot" id="status-dot"></div>
      <div>
        <div class="status-label" id="status-label">Checking…</div>
        <div class="status-sub" id="status-sub"></div>
      </div>
    </div>
  </div>

  <!-- Currently tracking (shown when active) -->
  <div class="section hidden" id="section-now">
    <div class="now-playing">
      <div class="np-label">Now tracking</div>
      <div class="np-title" id="np-title">—</div>
      <div class="np-meta"  id="np-meta">—</div>
    </div>
  </div>

  <!-- Session stats -->
  <div class="section" id="section-stats">
    <div class="stats-grid">
      <div class="stat-box">
        <div class="val" id="stat-min">0</div>
        <div class="lbl">Min today</div>
      </div>
      <div class="stat-box">
        <div class="val" id="stat-ep">0</div>
        <div class="lbl">Episodes</div>
      </div>
      <div class="stat-box">
        <div class="val" id="stat-titles">0</div>
        <div class="lbl">Titles</div>
      </div>
    </div>
  </div>

  <!-- Sites detected -->
  <div class="section hidden" id="section-sites">
    <div style="font-size:10px;color:#52525b;margin-bottom:4px">SITES TRACKED THIS SESSION</div>
    <div class="sites" id="sites-list"></div>
  </div>

  <!-- Actions -->
  <div class="section">
    <button class="btn primary hidden" id="btn-connect">Connect to YOMU</button>
    <button class="btn danger  hidden" id="btn-disconnect">Disconnect</button>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://manga-tracker-hazel.vercel.app" target="_blank" id="yomu-link">Open YOMU →</a>
    <span class="version">v1.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
